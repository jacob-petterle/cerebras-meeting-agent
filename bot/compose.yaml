services:
  zoomsdk: &zoomsdk
    build: ./
    platform: linux/amd64
    # Portable host.docker.internal: works on Docker Desktop for Mac for free,
    # and this makes the same hostname resolve on plain Linux Docker too. The
    # container Chromium loads the stage page from the Mac via this name.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Debug the agent live INSIDE the Zoom screen-share: DEBUG_UI=1 makes the bot load the FULL
      # operator console (?view=full) instead of the deliverable-only stage. Default 0 = clean
      # deliverable. Usage: `DEBUG_UI=1 docker compose up`.
      - DEBUG_UI=${DEBUG_UI:-0}
      # Explicit FULL override of the page Chromium loads (host + view). When unset, entry.sh builds
      # it from DEBUG_UI against the team's `packages/web` Vite dev server on the host.
      - STAGE_URL=${STAGE_URL:-}
      # Screen-share frame source: stage (capture Chromium on Xvfb) | text
      # (render out/share_text.txt). entry.sh skips launching Chromium for text.
      - SHARE_MODE=${SHARE_MODE:-stage}
    volumes:
     - .:/tmp/meeting-sdk-linux-sample
    ports:
      - "3000:3000"
      # TTS PCM ingestion (Mac TTS -> container virtual mic). 32kHz mono s16le.
      - "3001:3001"